name: TestPyPI validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev,audit,release]"
      - run: make test
      - run: make audit
      - id: version
        run: echo "version=$(python -c 'from llm_preflight import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: dist/

  testpypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/llm-preflight
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  testpypi-install:
    needs: [build, testpypi-publish]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m venv .testpypi-venv
      - name: Wait for TestPyPI and install the published package
        run: |
          for attempt in {1..8}; do
            if .testpypi-venv/bin/pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "llm-preflight==${VERSION}"; then
              exit 0
            fi
            if [ "${attempt}" -eq 8 ]; then
              exit 1
            fi
            sleep 15
          done
      - run: .testpypi-venv/bin/llm-preflight --quick "Reply with ok." --models mock:local --no-save
