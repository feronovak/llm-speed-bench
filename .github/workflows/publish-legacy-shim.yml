name: Publish legacy PyPI compatibility shim

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type PUBLISH-LEGACY-SHIM to publish the compatibility shim.
        required: true
        default: ""

permissions:
  contents: read

jobs:
  publish:
    if: github.event.inputs.confirm == 'PUBLISH-LEGACY-SHIM'
    runs-on: ubuntu-latest
    environment:
      name: pypi-legacy
      url: https://pypi.org/p/llm-speed-bench
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build twine
      - run: python -m build legacy-pypi-shim --outdir dist
      - run: python -m twine check dist/*
      - name: Publish the one-way compatibility shim
        uses: pypa/gh-action-pypi-publish@release/v1
